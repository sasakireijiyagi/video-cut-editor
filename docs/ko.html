<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyTranscribe — 정비 중</title>
  <meta name="description" content="EasyTranscribe 다운로드 페이지는 현재 정비 중입니다. 급하신 분은 GitHub에서 받으실 수 있습니다.">
  <meta name="google-site-verification" content="X27hTtGK0DeluBd_bZirCDejo-S46s7V5m6wwHhLbis">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://sasakireijiyagi.github.io/video-cut-editor/ko.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.8;
    }
    .card { text-align: center; max-width: 480px; }
    .icon { width: 72px; height: 72px; margin-bottom: 1.2rem; opacity: 0.95; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.2rem; }
    .en { font-size: 0.8rem; letter-spacing: 0.08em; color: #aaa; margin-bottom: 1.8rem; }
    .msg { font-size: 1.05rem; color: #444; margin-bottom: 0.6rem; }
    .sub { font-size: 0.9rem; color: #888; margin-bottom: 2.2rem; }
    .gh {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.8rem 1.8rem; border: 1.5px solid #1a1a1a; border-radius: 8px;
      color: #1a1a1a; text-decoration: none; font-size: 0.95rem; font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    .gh:hover { background: #1a1a1a; color: #fff; }
    .hint { margin-top: 0.9rem; font-size: 0.8rem; color: #aaa; }
    footer { margin-top: 2.4rem; font-size: 0.78rem; color: #bbb; }
    footer a { color: #999; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="AppIcon.png" alt="icon">
    <h1>EasyTranscribe</h1>
    <p class="en">おまかせ文字起こし</p>

    <p class="msg">현재 정비 중입니다 🛠</p>
    <p class="sub">조금만 기다려 주세요.</p>

    <a class="gh" href="https://github.com/sasakireijiyagi/video-cut-editor" target="_blank" rel="noopener">
      급하신 분은 GitHub에서 →
    </a>
    <p class="hint">다운로드·사용 방법은 GitHub 페이지에 있습니다</p>

    <footer>
      <a href="https://sasakireijiyagi.com/home" target="_blank" rel="noopener">Reiji Sasaki (Yagi Productions)</a>
    </footer>
  </div>
</body>
</html>
