name: Build Installers

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-arm:
    runs-on: macos-latest  # Apple Silicon (M1/M2/M3)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 PyQt6-Qt6 PyQt6-sip certifi

      - name: Build app
        run: |
          pyinstaller \
            --windowed \
            --name "EasyTranscribe" \
            --icon AppIcon.icns \
            --onedir \
            --collect-all PyQt6 \
            editor.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "おまかせ文字起こし" \
            --volicon AppIcon.icns \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "EasyTranscribe.app" 150 185 \
            --hide-extension "EasyTranscribe.app" \
            --app-drop-link 450 185 \
            "EasyTranscribe-Mac-AppleSilicon.dmg" \
            "dist/EasyTranscribe.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm-dmg
          path: EasyTranscribe-Mac-AppleSilicon.dmg

  build-mac-intel:
    runs-on: macos-13  # Intel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 PyQt6-Qt6 PyQt6-sip certifi

      - name: Build app
        run: |
          pyinstaller \
            --windowed \
            --name "EasyTranscribe" \
            --icon AppIcon.icns \
            --onedir \
            --collect-all PyQt6 \
            editor.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "おまかせ文字起こし" \
            --volicon AppIcon.icns \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "EasyTranscribe.app" 150 185 \
            --hide-extension "EasyTranscribe.app" \
            --app-drop-link 450 185 \
            "EasyTranscribe-Mac-Intel.dmg" \
            "dist/EasyTranscribe.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-intel-dmg
          path: EasyTranscribe-Mac-Intel.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 PyQt6-Qt6 PyQt6-sip certifi

      - name: Build exe
        run: |
          pyinstaller `
            --windowed `
            --name "EasyTranscribe" `
            --icon AppIcon.ico `
            --onedir `
            --collect-all PyQt6 `
            editor.py

      - name: Zip
        run: |
          Compress-Archive -Path dist\EasyTranscribe -DestinationPath EasyTranscribe-Windows.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: EasyTranscribe-Windows.zip

  release:
    needs: [build-mac-arm, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'mac-arm-dmg|windows-zip'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EasyTranscribe-Mac-AppleSilicon.dmg
            EasyTranscribe-Windows.zip

  release-intel:
    needs: [release, build-mac-intel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-intel-dmg

      - name: Upload Intel DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: EasyTranscribe-Mac-Intel.dmg
